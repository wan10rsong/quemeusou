apiVersion: apps/v1
kind: Deployment
metadata:
  name: quemeusou
  namespace: quemeusou
spec:
  replicas: 10
  selector:
    matchLabels:
      app: quemeusou
  template:
    metadata:
      labels:
        app: quemeusou
    spec:
      containers:
      - name: container-whoami
        image: traefik/whoami
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: quemeusou
  namespace: quemeusou
spec:
  type: NodePort
  selector:
    app: quemeusou
  ports:
  - port: 80
    targetPort: 80
    nodePort: 31156
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: quemeusou-ingress
  namespace: quemeusou
spec:
  rules:
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: quemeusou
            port:
              number: 80
